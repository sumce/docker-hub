name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch: # 也可以在 GitHub 页面手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build React UI
        run: npm run build

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          # wrangler-action 默认执行 `wrangler deploy`，读取 wrangler.jsonc
